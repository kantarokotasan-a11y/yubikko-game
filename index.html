<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2d1b69">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ゆびっこ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ゆびっこ育成ゲーム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:#1a1a2e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'DotGothic16',monospace;
  background-image:radial-gradient(circle at 20% 50%,#2a1a3e 0%,transparent 50%),
                   radial-gradient(circle at 80% 20%,#001a2a 0%,transparent 50%);
  gap:8px;
}
.game-title{color:#f5e6c8;font-size:12px;letter-spacing:4px;text-shadow:0 0 12px rgba(245,230,200,0.5);}

/* デバイス */
.device{width:min(300px,92vw);background:linear-gradient(160deg,#f5e6c8 0%,#e8d5a3 40%,#d4b87a 100%);border-radius:40px 40px 60px 60px;padding:16px 16px 24px;box-shadow:0 0 0 4px #b8954a,0 0 0 7px #8a6c2a,0 20px 60px rgba(0,0,0,0.8),inset 0 2px 6px rgba(255,255,255,0.5),inset 0 -4px 8px rgba(0,0,0,0.15);}

/* スクリーン */
.screen-bezel{background:#3a2a10;border-radius:14px;padding:8px;box-shadow:inset 0 4px 12px rgba(0,0,0,0.7);margin-bottom:14px;}
.screen{background:linear-gradient(180deg,#b8d878,#c8e888);border-radius:8px;width:100%;height:200px;position:relative;overflow:hidden;}
.screen::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 3px);pointer-events:none;z-index:20;border-radius:8px;}

/* バッジ（禿げ・体型） */
.badges{position:absolute;top:6px;left:7px;z-index:5;font-size:7px;color:#2a4a08;line-height:1.8;}
/* 食事カウンター */
.meal-count{position:absolute;top:6px;right:7px;z-index:5;font-size:8px;color:#2a4a08;text-align:right;line-height:1.8;}

/* キャラエリア */
.pet-area{position:absolute;bottom:26px;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;height:130px;}
.pet-img{height:125px;width:auto;object-fit:contain;transform-origin:bottom center;filter:drop-shadow(0 6px 8px rgba(0,0,0,0.4));transition:opacity 0.35s ease,transform 0.8s cubic-bezier(0.34,1.56,0.64,1);}
.pet-img.body-thin   {transform:scaleX(0.78);}
.pet-img.body-normal {transform:scaleX(1.0);}
.pet-img.body-chubby {transform:scaleX(1.18);}
.pet-img.body-fat    {transform:scaleX(1.38);}

/* アニメーション */
@keyframes idle-bounce{0%,100%{translate:0 0;rotate:0deg;}50%{translate:0 -8px;rotate:-2deg;}}
@keyframes happy-jump {0%,100%{translate:0 0;rotate:-4deg;}25%{translate:0 -14px;rotate:4deg;}75%{translate:0 -8px;rotate:-2deg;}}
@keyframes sad-droop  {0%,100%{translate:0 0;rotate:-2deg;}50%{translate:0 3px;rotate:2deg;}}
@keyframes sleep-sway {0%,100%{rotate:-5deg;}50%{rotate:5deg;translate:0 2px;}}
@keyframes eating     {0%,100%{translate:0 0;scale:1;}30%{translate:0 -5px;scale:1.08;}60%{translate:0 2px;scale:0.96;}}
@keyframes sick-wobble{0%,100%{rotate:0deg;}25%{rotate:-8deg;translate:0 2px;}75%{rotate:8deg;translate:0 2px;}}
@keyframes death-fall {0%{rotate:0deg;translate:0 0;opacity:1;}60%{rotate:90deg;translate:0 10px;opacity:0.5;}100%{rotate:90deg;translate:0 30px;opacity:0;}}
@keyframes bald-panic {0%,100%{translate:0 0;scale:1;}20%{translate:0 -10px;scale:1.1;rotate:-5deg;}40%{translate:0 -5px;scale:0.95;rotate:5deg;}}
@keyframes flash-warn {0%,100%{background:linear-gradient(180deg,#b8d878,#c8e888);}50%{background:linear-gradient(180deg,#e8c878,#f0d888);}}

.pet-img.s-idle   {animation:idle-bounce 2s    ease-in-out infinite;}
.pet-img.s-happy  {animation:happy-jump  0.5s  ease-in-out infinite;}
.pet-img.s-sad    {animation:sad-droop   2.5s  ease-in-out infinite;}
.pet-img.s-sleepy {animation:sleep-sway  3s    ease-in-out infinite;}
.pet-img.s-eating {animation:eating      0.35s ease-in-out infinite;}
.pet-img.s-sick   {animation:sick-wobble 1s    ease-in-out infinite;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3)) hue-rotate(60deg) saturate(0.7);}
.pet-img.s-dead   {animation:death-fall  1.5s  ease-in     forwards;}
.pet-img.s-bald   {animation:bald-panic  0.4s  ease-in-out infinite;}
.screen.flashing  {animation:flash-warn  0.5s  ease-in-out 3;}

/* 吹き出し */
.bubble{position:absolute;bottom:32px;left:50%;transform:translateX(-50%) scale(0);background:white;border:2px solid #2a4a08;border-radius:10px;padding:4px 10px;font-size:10px;z-index:15;opacity:0;transition:opacity 0.2s,transform 0.2s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;color:#2a4a08;pointer-events:none;}
.bubble.show{opacity:1;transform:translateX(-50%) scale(1);}
.bubble::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top:4px solid #2a4a08;}

/* エフェクト */
.fx{position:absolute;inset:0;pointer-events:none;z-index:10;overflow:hidden;}
.fxp{position:absolute;font-size:16px;animation:pfx 1s ease-out forwards;}
@keyframes pfx{0%{translate:0 0;scale:0.5;opacity:1;}100%{translate:0 -65px;scale:1.2;opacity:0;}}

/* 地面・影 */
.ground{position:absolute;bottom:0;left:0;right:0;height:26px;background:repeating-linear-gradient(90deg,#90b840 0,#90b840 12px,#80a830 12px,#80a830 24px);border-radius:0 0 8px 8px;}
.shadow{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:60px;height:8px;background:radial-gradient(ellipse,rgba(0,0,0,0.3) 0%,transparent 70%);border-radius:50%;}

/* メッセージバー */
.msg-bar{background:#3a2a10;border-radius:0 0 8px 8px;margin:-8px -8px 10px;padding:4px 10px;font-size:9px;color:#c8e888;text-align:center;min-height:20px;line-height:1.5;}

/* ボタン */
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{height:44px;border-radius:22px;border:none;cursor:pointer;font-family:'DotGothic16',monospace;font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px;transition:transform 0.1s,box-shadow 0.1s;user-select:none;}
.btn:active{transform:scale(0.93) translateY(2px);}
.btn .i{font-size:17px;}
.bf{background:linear-gradient(145deg,#ff9b4e,#e07a2a);color:#fff;box-shadow:0 4px 0 #9e4e10,0 5px 12px rgba(0,0,0,0.3);}
.bp{background:linear-gradient(145deg,#6ee86e,#3db83d);color:#fff;box-shadow:0 4px 0 #1f7a1f,0 5px 12px rgba(0,0,0,0.3);}
.bc{background:linear-gradient(145deg,#5ec8f0,#2a9fd4);color:#fff;box-shadow:0 4px 0 #1a6a96,0 5px 12px rgba(0,0,0,0.3);}
.bs{background:linear-gradient(145deg,#b09eff,#7c5ce0);color:#fff;box-shadow:0 4px 0 #4a2a9e,0 5px 12px rgba(0,0,0,0.3);}
.bf:active{box-shadow:0 1px 0 #9e4e10,0 2px 6px rgba(0,0,0,0.3);}
.bp:active{box-shadow:0 1px 0 #1f7a1f,0 2px 6px rgba(0,0,0,0.3);}
.bc:active{box-shadow:0 1px 0 #1a6a96,0 2px 6px rgba(0,0,0,0.3);}
.bs:active{box-shadow:0 1px 0 #4a2a9e,0 2px 6px rgba(0,0,0,0.3);}

/* ゲームオーバー */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:30;border-radius:8px;opacity:0;pointer-events:none;transition:opacity 0.6s;}
.overlay.show{opacity:1;pointer-events:all;}
.ov-emoji{font-size:36px;}
.ov-text{color:#c8e888;font-size:14px;text-align:center;line-height:1.8;}
.ov-sub{color:#90b060;font-size:8px;}
.restart-btn{background:#c8e888;color:#1a3a00;border:none;padding:8px 20px;border-radius:16px;font-family:'DotGothic16',monospace;font-size:10px;cursor:pointer;margin-top:4px;}

/* ===== 食事メニューオーバーレイ ===== */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.25s;}
.menu-overlay.show{opacity:1;pointer-events:all;}
.menu-sheet{width:min(320px,100vw);background:#1a1a2e;border-radius:24px 24px 0 0;padding:16px 16px 32px;border-top:3px solid #4a3a8a;max-height:80vh;overflow-y:auto;}
.menu-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.menu-title{color:#f5e6c8;font-size:13px;letter-spacing:2px;}
.menu-count{color:#8a7ab8;font-size:9px;}
.menu-close{background:none;border:none;color:#8a7ab8;font-size:20px;cursor:pointer;padding:4px;}
.menu-cat{margin-bottom:14px;}
.menu-cat-title{font-size:9px;color:#8a7ab8;margin-bottom:6px;padding-left:2px;letter-spacing:1px;}
.menu-items{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.menu-item{background:#2a2a4e;border:none;border-radius:12px;padding:10px 8px;cursor:pointer;font-family:'DotGothic16',monospace;text-align:left;transition:all 0.1s;border:1px solid #3a3a6e;}
.menu-item:active{transform:scale(0.95);background:#3a3a6e;}
.menu-item-emoji{font-size:22px;display:block;text-align:center;margin-bottom:4px;}
.menu-item-name{font-size:9px;color:#c8c8f0;display:block;text-align:center;}
.menu-item-stats{font-size:7px;display:flex;justify-content:center;gap:4px;margin-top:3px;}
.stat-good{color:#6ee86e;}
.stat-bad {color:#ff8080;}
.stat-neu {color:#f0d060;}
/* 食べ過ぎペナルティ警告色 */
.menu-item.penalty{border-color:#aa4400;background:#3a1a0e;}
.menu-item.penalty .menu-item-name{color:#ffaa80;}

/* ===== ミニゲーム共通オーバーレイ ===== */
.mg-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.2s;}
.mg-overlay.show{opacity:1;pointer-events:all;}
.mg-box{width:min(300px,94vw);background:#0a0a1e;border-radius:20px;padding:18px;border:2px solid #3a3a8a;box-shadow:0 0 40px rgba(80,80,200,0.3);display:flex;flex-direction:column;align-items:center;gap:12px;}
.mg-title{color:#f5e6c8;font-size:14px;letter-spacing:2px;text-align:center;}
.mg-sub{color:#8a8ab8;font-size:9px;text-align:center;}
.mg-screen{width:100%;height:180px;background:#050510;border-radius:12px;position:relative;overflow:hidden;border:1px solid #2a2a6a;touch-action:none;}
.mg-info{color:#c8e888;font-size:11px;text-align:center;min-height:18px;}
.mg-result{color:#f5e6c8;font-size:13px;text-align:center;line-height:1.8;}
.mg-btn-row{display:flex;gap:10px;}
.mg-btn{background:#3a3a8a;color:#f5e6c8;border:none;padding:10px 20px;border-radius:14px;font-family:'DotGothic16',monospace;font-size:11px;cursor:pointer;}
.mg-btn.primary{background:linear-gradient(145deg,#6060e0,#4040b0);box-shadow:0 3px 0 #202080;}
.mg-btn.primary:active{transform:translateY(2px);box-shadow:0 1px 0 #202080;}
.mg-btn.close{background:#2a2a4a;}

/* ミニゲーム選択画面 */
.mg-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;}
.mg-select-btn{background:#1a1a3e;border:2px solid #3a3a8a;border-radius:14px;padding:14px 8px;cursor:pointer;font-family:'DotGothic16',monospace;text-align:center;transition:all 0.1s;}
.mg-select-btn:active{transform:scale(0.95);background:#2a2a5e;}
.mg-select-emoji{font-size:28px;display:block;margin-bottom:6px;}
.mg-select-name{font-size:10px;color:#c8c8f0;display:block;}
.mg-select-desc{font-size:7px;color:#7a7ab8;display:block;margin-top:3px;}

/* ドラムタップ ノーツ */
.drum-lane{position:absolute;bottom:0;top:0;width:22%;}
.drum-note{position:absolute;width:80%;left:10%;height:32px;border-radius:8px;animation:note-fall linear forwards;}
@keyframes note-fall{from{top:-40px;}to{top:100%;}}
.drum-hit-zone{position:absolute;bottom:8px;left:5%;width:90%;height:36px;border:2px solid rgba(255,255,255,0.15);border-radius:8px;background:rgba(255,255,255,0.05);}
.drum-judge{position:absolute;font-size:13px;font-weight:bold;animation:judge-pop 0.6s ease-out forwards;pointer-events:none;}
@keyframes judge-pop{0%{opacity:1;translate:0 0;scale:1;}100%{opacity:0;translate:0 -30px;scale:1.4;}}
.drum-lane-btn{position:absolute;bottom:0;left:0;right:0;height:52px;background:rgba(255,255,255,0.06);border-radius:0 0 8px 8px;cursor:pointer;border:none;}

/* 💩スクリーン内表示 */
.poop-item{position:absolute;font-size:22px;z-index:8;animation:poop-appear 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;cursor:default;user-select:none;}
@keyframes poop-appear{from{scale:0;opacity:0;}to{scale:1;opacity:1;}}
.poop-item.poop-shake{animation:poop-wobble 0.5s ease-in-out infinite;}
@keyframes poop-wobble{0%,100%{rotate:-8deg;}50%{rotate:8deg;}}

/* ===== 名前入力スタート画面 ===== */
.name-screen{
  position:fixed;inset:0;background:#1a1a2e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:500;
  background-image:radial-gradient(circle at 20% 50%,#2a1a3e 0%,transparent 50%),
                   radial-gradient(circle at 80% 20%,#001a2a 0%,transparent 50%);
  transition:opacity 0.5s;
}
.name-screen.hide{opacity:0;pointer-events:none;}
.name-logo{color:#f5e6c8;font-size:14px;letter-spacing:4px;text-shadow:0 0 12px rgba(245,230,200,0.5);}
.name-chara{width:130px;height:auto;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.6));animation:idle-bounce 2s ease-in-out infinite;}
.name-msg{color:#c8e888;font-size:10px;text-align:center;line-height:2;}
.name-input{
  width:min(240px,75vw);background:#0a0a2e;border:2px solid #4a3a8a;border-radius:14px;
  padding:12px 16px;font-family:'DotGothic16',monospace;font-size:15px;
  color:#f5e6c8;text-align:center;outline:none;transition:border-color 0.2s;
}
.name-input:focus{border-color:#8a6ae0;}
.name-input::placeholder{color:#3a3a6a;}
.name-start-btn{
  background:linear-gradient(145deg,#8a6ae0,#6040c0);color:#f5e6c8;
  border:none;padding:14px 36px;border-radius:24px;
  font-family:'DotGothic16',monospace;font-size:13px;cursor:pointer;
  box-shadow:0 4px 0 #3020a0,0 6px 20px rgba(100,60,220,0.4);
  transition:all 0.1s;letter-spacing:2px;
}
.name-start-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #3020a0;}
.name-start-btn:disabled{opacity:0.35;cursor:not-allowed;}
</style>
</head>
<body>

<!-- タイトル選択画面（続きor新規） -->
<div class="name-screen" id="selectScreen">
  <div class="name-logo">🫵 ゆびっこ育成ゲーム 🫵</div>
  <div style="font-size:72px;animation:idle-bounce 2s ease-in-out infinite;filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));">🫵</div>
  <div class="name-msg" id="selectMsg">どうする？</div>
  <div style="display:flex;flex-direction:column;gap:10px;width:min(240px,75vw);">
    <button class="name-start-btn" id="continueBtn" onclick="continueGame()" style="background:linear-gradient(145deg,#60a0e0,#4080c0);box-shadow:0 4px 0 #204080,0 6px 20px rgba(60,100,220,0.4);">続きを育てる 🫵</button>
    <button class="name-start-btn" onclick="showNameScreen()" style="font-size:11px;">あたらしく飼う ✨</button>
  </div>
</div>

<!-- 名前入力画面 -->
<div class="name-screen" id="nameScreen" style="display:none;">
  <div class="name-logo">🫵 ゆびっこ育成ゲーム 🫵</div>
  <div style="font-size:72px;animation:idle-bounce 2s ease-in-out infinite;filter:drop-shadow(0 6px 12px rgba(0,0,0,0.5));">🫵</div>
  <div class="name-msg">あたらしいゆびっこが<br>やってきた！<br>なまえをつけてあげよう</div>
  <input class="name-input" id="nameInput" type="text" maxlength="8" placeholder="なまえ（8文字まで）" oninput="onNameInput()">
  <button class="name-start-btn" id="nameStartBtn" onclick="startGame()" disabled>飼育スタート！ 🎉</button>
</div>

<div class="game-title" id="gameTitle">🫵 ゆびっこ 🫵</div>

<div class="device">
  <div class="screen-bezel">
    <div class="msg-bar" id="msgBar">やあ！おれはゆびっこだ！よろしくな！</div>
    <div class="screen" id="mainScreen">
      <div class="badges" id="badges">💇フサフサ<br>⚖️ふつう</div>
      <div class="pet-area">
        <div class="shadow"></div>
        <img class="pet-img s-idle body-normal" id="petImg" src="hair0.png" alt="ゆびっこ">
      </div>
      <div class="bubble" id="bubble">よろしくな！</div>
      <div class="fx" id="fx"></div>
      <div id="poopArea"></div>
      <div class="ground"></div>
      <div class="overlay" id="overlay">
        <div class="ov-emoji">🫵💀</div>
        <div class="ov-text" id="ovText">ゆびっこは<br>逝ってしまった…</div>
        <div class="ov-sub" id="ovSub"></div>
        <button class="restart-btn" onclick="restart()">もう一度育てる</button>
      </div>
    </div>
  </div>
  <div class="btn-grid">
    <button class="btn bf" onclick="openMenu()"><span class="i">🍽️</span>ごはん</button>
    <button class="btn bp" onclick="action('run')"><span class="i">🏃</span>うんどう</button>
    <button class="btn bc" onclick="action('clean')"><span class="i">🧹</span>せいそう</button>
    <button class="btn bs" id="sleepBtn" onclick="action('sleep')"><span class="i">🌅</span>起こす</button>
  </div>
</div>

<!-- ミニゲームオーバーレイ -->
<div class="mg-overlay" id="mgOverlay">
  <div class="mg-box" id="mgBox"></div>
</div>

<!-- 食事メニュー -->
<div class="menu-overlay" id="menuOverlay">
  <div class="menu-sheet">
    <div class="menu-header">
      <span class="menu-title">🍽️ なにたべる？</span>
      <span class="menu-count" id="menuCountLabel"></span>
      <button class="menu-close" onclick="closeMenu()">✕</button>
    </div>
    <div id="menuBody"></div>
  </div>
</div>

<script>
// ===================================================
// 食事メニュー定義
// ===================================================
const MENU = {
  'ジャンク系🔥': [
    {name:'ラーメン',    emoji:'🍜', satisfy:30, health:-10, weight:+8,  kcal:800},
    {name:'ハンバーガー',emoji:'🍔', satisfy:25, health:-12, weight:+10, kcal:900},
    {name:'ステーキ',    emoji:'🥩', satisfy:28, health:-5,  weight:+6,  kcal:850},
    {name:'ピザ',        emoji:'🍕', satisfy:26, health:-11, weight:+9,  kcal:950},
    {name:'唐揚げ',      emoji:'🍗', satisfy:22, health:-8,  weight:+7,  kcal:700},
    {name:'カレー',      emoji:'🍛', satisfy:24, health:-6,  weight:+5,  kcal:750},
  ],
  'ふつう系🍱': [
    {name:'お寿司',      emoji:'🍣', satisfy:20, health:+5,  weight:+3,  kcal:500},
    {name:'おにぎり',    emoji:'🍙', satisfy:15, health:+3,  weight:+2,  kcal:400},
    {name:'うどん',      emoji:'🍲', satisfy:18, health:+2,  weight:+3,  kcal:450},
    {name:'卵かけご飯',  emoji:'🥚', satisfy:14, health:+4,  weight:+2,  kcal:380},
    {name:'親子丼',      emoji:'🥘', satisfy:20, health:+0,  weight:+4,  kcal:550},
    {name:'サンドイッチ',emoji:'🥪', satisfy:16, health:+2,  weight:+2,  kcal:420},
  ],
  'ヘルシー系🥗': [
    {name:'サラダ',      emoji:'🥗', satisfy:8,  health:+20, weight:-5,  kcal:120},
    {name:'焼き魚',      emoji:'🐟', satisfy:15, health:+15, weight:-2,  kcal:250},
    {name:'煮物',        emoji:'🥣', satisfy:12, health:+18, weight:-3,  kcal:200},
    {name:'豆腐',        emoji:'🫙', satisfy:10, health:+16, weight:-4,  kcal:150},
    {name:'フルーツ',    emoji:'🍎', satisfy:12, health:+12, weight:-2,  kcal:180},
    {name:'野菜スープ',  emoji:'🍵', satisfy:10, health:+14, weight:-3,  kcal:100},
  ],
};

// 食べ過ぎ固定ペナルティ（5回目以降）
const PENALTY = {satisfy:15, health:-18, weight:+12};
const MAX_FREE_MEALS = 4; // 1日の個別効果上限

// ===================================================
// セーブ / ロード
// ===================================================
const SAVE_KEY = 'yubicci_v2';
const POOP_QUEUE_KEY = 'yubicci_poop_queue';

function saveGame() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({...state, savedAt:Date.now()}));
}

// 食後💩予定をキューに保存
function savePendingPoop(scheduledAt) {
  const queue = getPendingPoops();
  queue.push(scheduledAt);
  localStorage.setItem(POOP_QUEUE_KEY, JSON.stringify(queue));
}

function getPendingPoops() {
  try { return JSON.parse(localStorage.getItem(POOP_QUEUE_KEY)) || []; }
  catch(e) { return []; }
}

function clearPendingPoops() {
  localStorage.removeItem(POOP_QUEUE_KEY);
}

// 起動時に期限切れの💩キューを処理
function processPendingPoops() {
  const queue = getPendingPoops();
  const now = Date.now();
  let remaining = [];
  let poopsDue = 0;

  queue.forEach(scheduledAt => {
    if (scheduledAt <= now) {
      poopsDue++;
    } else {
      remaining.push(scheduledAt);
      // まだ時間が来てないものはタイマーをセット
      const delay = scheduledAt - now;
      setTimeout(() => {
        if (!state.alive || state.poopCount >= POOP_MAX) return;
        spawnPoop();
        updateUI();
        saveGame();
        // キューから削除
        const q = getPendingPoops().filter(t => t !== scheduledAt);
        localStorage.setItem(POOP_QUEUE_KEY, JSON.stringify(q));
      }, delay);
    }
  });

  // 期限切れ分をまとめて処理
  if (poopsDue > 0 && state.alive) {
    const actualPoops = Math.min(poopsDue, POOP_MAX - state.poopCount);
    for (let i = 0; i < actualPoops; i++) spawnPoop();
    if (poopsDue > 0) setMsg(`💩が${poopsDue}個溜まってたよ！片付けて！`);
  }

  localStorage.setItem(POOP_QUEUE_KEY, JSON.stringify(remaining));
}

function loadGame() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!s) return null;
    const savedDate = new Date(s.savedAt).toDateString();
    const today     = new Date().toDateString();
    if (savedDate !== today) s.mealsToday = 0;
    const offlineMins = Math.min((Date.now() - s.savedAt) / 60000, 360);
    if (s.alive && offlineMins > 0) {
      s.satisfy = Math.max(0, s.satisfy - offlineMins * 0.8);
      s.health  = s.satisfy < 20 ? Math.max(0, s.health - offlineMins * 0.5) : s.health;
      s.weight  = s.weight + offlineMins * 0.1;
    }
    return s;
  } catch(e) { return null; }
}

// ゲーム状態
// ===================================================
const DEFAULT = {
  satisfy:70, health:100, weight:50,
  mealsToday:0,
  calorie:0,
  poopCount:0,
  poopPositions:[],
  bodyType:'normal',
  alive:true, sleeping:false, actionLock:false,
  hairStage:0,
};
const saved = loadGame();
let state = saved && saved.alive ? {...DEFAULT,...saved,actionLock:false} : {...DEFAULT};

// 自然減少タイマー（1分ごと）
setInterval(naturalDecay, 60000);
function naturalDecay() {
  if (!state.alive || state.sleeping) return;
  state.satisfy = Math.max(0, state.satisfy - 5);
  state.weight  = state.weight + 0.3;
  if (state.satisfy < 20) state.health = Math.max(0, state.health - 3);
  if (state.weight  > 85) state.health = Math.max(0, state.health - 2);
  if (state.health <= 0) { gameover(); return; }
  updateUI(); autoMsg(); saveGame();
}

// 💩ダメージタイマー（1時間ごと）
setInterval(poopDecay, 3600000);
function poopDecay() {
  if (!state.alive || state.poopCount === 0) return;
  state.health = Math.max(0, state.health - state.poopCount * 2);
  if      (state.poopCount >= 3) showBubble('くさい…くさすぎる…');
  else if (state.poopCount >= 2) showBubble('片付けてくれ…頼む…');
  else                           showBubble('💩が…ある…');
  if (state.health <= 0) { gameover(); return; }
  updateUI(); saveGame();
}

// ===================================================
// 💩システム
// ===================================================
const POOP_THRESHOLD = 250; // このkcalを超えたら💩1個
const POOP_MAX = 3;

function addCalorie(kcal) {
  state.calorie += kcal;
  while (state.calorie >= POOP_THRESHOLD && state.poopCount < POOP_MAX) {
    state.calorie -= POOP_THRESHOLD;
    const scheduledAt = Date.now() + 60 * 60 * 1000; // 1時間後
    savePendingPoop(scheduledAt);
    // アプリ開いてる間用のタイマーも仕掛ける
    setTimeout(() => {
      if (!state.alive || state.poopCount >= POOP_MAX) return;
      spawnPoop();
      updateUI();
      saveGame();
      const q = getPendingPoops().filter(t => t !== scheduledAt);
      localStorage.setItem(POOP_QUEUE_KEY, JSON.stringify(q));
    }, 60 * 60 * 1000);
    setMsg('ごはん食べた！消化中…🍽️');
  }
  if (state.calorie >= POOP_THRESHOLD && state.poopCount >= POOP_MAX) {
    state.calorie = POOP_THRESHOLD - 1;
  }
}

function spawnPoop() {
  state.poopCount = Math.min(POOP_MAX, state.poopCount + 1);
  // ランダム座標（地面付近・キャラと重ならない位置）
  const positions = [
    {left:'12%', bottom:'28px'},
    {left:'68%', bottom:'28px'},
    {left:'38%', bottom:'28px'},
  ];
  state.poopPositions = positions.slice(0, state.poopCount);
  renderPoops();
  setMsg('💩 したよ！片付けてくれ！');
  showBubble('うっ…💩しちゃった');
  playSE('poop');
  spawnFx(['💩','💨']);
}

function renderPoops() {
  const area = document.getElementById('poopArea');
  if (!area) return;
  area.innerHTML = '';
  state.poopPositions.forEach((pos, i) => {
    const el = document.createElement('div');
    el.className = 'poop-item' + (state.poopCount >= 2 ? ' poop-shake' : '');
    el.textContent = '💩';
    el.style.left   = pos.left;
    el.style.bottom = pos.bottom;
    area.appendChild(el);
  });
}

// 体型タイプ（PNG直接差し替え）

// PNG対応表
// body-normal.png, body-thin.png, body-fat.png, body-macho.png, body-sick.png
// body-macho-bald.png（禿げマッチョ専用）
// 他の禿げはhair1〜4.pngを使う（既存の禿げPNG）

function getBodyFile(bodyType, hairStage) {
  // つるつる（hair4）専用PNG
  if (hairStage >= 4) {
    if (bodyType === 'macho') return 'body-macho-bald.png';
    if (bodyType === 'fat')   return 'body-fat-bald.png';
    if (bodyType === 'sick')  return 'body-sick-bald.png';
    if (bodyType === 'thin')  return 'hair4.png'; // ガリ×つるつる→hair4で代用
    return 'hair4.png'; // normal×つるつる
  }
  // ほぼ禿げ（hair3）専用PNG
  if (hairStage === 3) {
    if (bodyType === 'macho') return 'body-macho-hair3.png';
    if (bodyType === 'fat')   return 'body-fat-hair3.png';
    if (bodyType === 'thin')  return 'body-thin-hair3.png';
    if (bodyType === 'sick')  return 'body-sick-hair3.png';
    return 'hair3.png'; // normal×ほぼ禿げ
  }
  // hair0〜2はbodyTypeのPNGをベースに（髪の変化はhairPNGで対応）
  if (bodyType === 'macho') return 'body-macho.png';
  if (bodyType === 'fat')   return 'body-fat.png';
  if (bodyType === 'thin')  return 'body-thin.png';
  if (bodyType === 'sick')  return 'body-sick.png';
  // normal: 禿げ段階のhairPNGを使う
  const hairFiles = ['hair0.png','hair1.png','hair2.png','hair3.png','hair4.png'];
  return hairFiles[hairStage];
}

function updateCharacter() {
  // 禿げ段階を計算
  let ns = 0;
  if      (state.health < 20) ns = 4;
  else if (state.health < 40) ns = 3;
  else if (state.health < 60) ns = 2;
  else if (state.health < 80) ns = 1;
  const hairChanged = ns !== state.hairStage;
  state.hairStage = ns;

  // 体型は0時進化で決まる（state.bodyType）
  const bodyType = state.bodyType || 'normal';

  const newFile = getBodyFile(bodyType, ns);

    petImg.src = newFile;

// ===================================================
// 0時進化システム
// ===================================================
function checkMidnightEvolution() {
  const today = new Date().toDateString();
  if (state.lastDate === today) return; // まだ日付変わってない
  // 日付更新・食事リセット
  state.mealsToday = 0;
  state.lastDate = today;

  const prevType = state.bodyType || 'normal';
  let newType = 'normal';

  // 進化判定
  if (state.health < 30) {
    newType = 'sick';   // 病弱：健康30未満
  } else if (state.health >= 150 && state.weight <= 80) {
    newType = 'macho';  // マッチョ：健康150以上かつ体重80以下
  } else if (state.weight >= 130) {
    newType = 'fat';    // デブ：体重130以上
  } else if (state.weight <= 30) {
    newType = 'thin';   // ガリガリ：体重30以下
  } else {
    newType = 'normal';
  }

  state.bodyType = newType;

  if (newType !== prevType) {
    playSE('levelup');
    // 進化演出
    const evo = {
      macho:  { msg:'💪 マッチョに進化した！！', fx:['💪','⭐','🔥'], bubble:'筋肉がっ…！' },
      fat:    { msg:'🐷 デブに進化した…',        fx:['🐷','⬆️','😅'], bubble:'重い…体が重い…' },
      thin:   { msg:'🦴 ガリガリに進化した…',    fx:['🦴','💨','😱'], bubble:'肋骨が…見える…' },
      sick:   { msg:'🤒 病弱に進化した…',        fx:['🤒','💊','😰'], bubble:'体が…もたない…' },
      normal: { msg:'⚖️ ふつうに戻った！',        fx:['✨','😊','👍'], bubble:'体が戻った気がする' },
    };
    const e = evo[newType];
    setTimeout(() => {
      setMsg(e.msg);
      showBubble(e.bubble);
      spawnFx(e.fx);
      updateCharacter();
    }, 500);
  }
}

const ANIMS = ['s-idle','s-happy','s-sad','s-sleepy','s-eating','s-sick','s-dead','s-bald'];
function setAnim(a, dur=0) {
  ANIMS.forEach(s => petImg.classList.remove(s));
  petImg.classList.add(a);
  if (dur > 0) setTimeout(() => setAnim(autoAnim()), dur);
}
function autoAnim() {
  if (!state.alive)                          return 's-dead';
  if (state.sleeping)                        return 's-sleepy';
  if (state.health < 20)                     return 's-bald';
  if (state.health < 40 || state.bodyType === 'sick') return 's-sick';
  if (state.satisfy < 25)                    return 's-sad';
  if (state.bodyType === 'fat')              return 's-sad';
  if (state.bodyType === 'macho' || (state.satisfy > 70 && state.health > 70)) return 's-happy';
  return 's-idle';
}

// ===================================================

function spawnFx(emojis) {
  const c = document.getElementById('fx');
  for (let i=0;i<5;i++) setTimeout(() => {
    const el = document.createElement('div'); el.className = 'fxp';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];

}
function showBubble(t) {

  clearTimeout(b._t); b._t = setTimeout(() => b.classList.remove('show'), 2600);
}
function setMsg(t) { document.getElementById('msgBar').textContent = t; }
function autoMsg() {
  if (state.sleeping) return;
  if      (state.health  < 20)  setMsg('ぐえっ…頭も…体も限界…');
  else if (state.weight  > 130) setMsg('…重い。動きたくない。');
  else if (state.weight  < 25)  setMsg('腹減りすぎてガリガリだ…');
  else if (state.satisfy < 20)  setMsg('腹減った…なんか食わせてくれ');
  else if (state.satisfy > 150) setMsg('うまかった！最高に満足！');
  else {
    const idle = ['よう！元気か？','ゆびっこだぞ！','なんか用か？','指ってすごくない？'];
    setMsg(idle[Math.floor(Math.random()*idle.length)]);
  }
}

// ===================================================
function openMenu() {
  if (!state.alive) return;
  if (state.sleeping) { showBubble('Zz…起こして…'); return; }
  checkDayReset();

  const body = document.getElementById('menuBody');
  body.innerHTML = '';

  Object.entries(MENU).forEach(([cat, items]) => {
    const catEl = document.createElement('div');
    catEl.className = 'menu-cat';
    catEl.innerHTML = `<div class="menu-cat-title">${cat}</div><div class="menu-items"></div>`;
    const grid = catEl.querySelector('.menu-items');

    items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'menu-item';
      btn.innerHTML = `
        <span class="menu-item-emoji">${item.emoji}</span>
        <span class="menu-item-name">${item.name}</span>`;
      btn.onclick = () => eat(item);
      grid.appendChild(btn);
    });
    body.appendChild(catEl);
  });

  document.getElementById('menuOverlay').classList.add('show');
}

function closeMenu() {
  document.getElementById('menuOverlay').classList.remove('show');
}

function eat(item) {
  closeMenu();
  checkDayReset();
  const isPenalty = state.mealsToday >= MAX_FREE_MEALS;
  const eff = isPenalty ? PENALTY : item;

  state.satisfy    = state.satisfy + eff.satisfy;
  state.health     = Math.max(0, state.health + eff.health);
  state.weight     = Math.max(0, state.weight + eff.weight);
  state.mealsToday += 1;
  // カロリー加算 → 💩チェック
  addCalorie(isPenalty ? 600 : (item.kcal || 400));

  const emoji = isPenalty ? '🤢' : item.emoji;
  const msgs = isPenalty
    ? ['うぷ…食いすぎだ…','もう限界…お腹パンパン','これ以上は…太る…']
    : (eff.health >= 10
      ? ['うまい！体にいい感じ！','ヘルシー最高！','これで健康になれる！']
      : eff.health < -8
      ? ['うんまい！！！','最高だけど体に悪いな…','ジャンクって最高！']
      : ['うまい！','ごちそうさま！','まあまあだな']);
  const msg = msgs[Math.floor(Math.random()*msgs.length)];

  showBubble(isPenalty ? `${emoji} ${msg}` : `${emoji} ${msg}`);
  setMsg(`${item.name}を食べた！`);
  setAnim('s-eating', 1200);
  spawnFx([emoji,'✨', eff.health >= 5 ? '💚' : eff.weight > 5 ? '⬆️' : '😋']);

  if (state.health <= 0) { gameover(); return; }
  updateUI();
  setAnim(autoAnim());
  saveGame();
}

// ===================================================
// その他アクション
// ===================================================
function action(type) {
  if (!state.alive || state.actionLock) return;
  if (state.sleeping && type !== 'sleep') { showBubble('Zz…起こして！'); return; }
  state.actionLock = true;
  setTimeout(() => state.actionLock = false, 800);

  switch(type) {
    case 'run':
      openMgSelect();
      state.actionLock = false;
      return;
    case 'clean':
      if (state.poopCount === 0) {
        showBubble('きれいだよ！問題なし！');
        setMsg('💩はないよ！えらい！');
        setAnim('s-happy', 1000);
      } else {
        const cleaned = state.poopCount;
        state.poopCount = 0;
        state.poopPositions = [];
        state.health = state.health + cleaned * 1;
        renderPoops();
        showBubble('ありがとう！さっぱり！');
        setMsg(`💩${cleaned}個片付けた！健康+${cleaned}！`);
        setAnim('s-happy', 1200);
        spawnFx(['✨','🧹','💨']);
      }
      break;
    case 'sleep':
      if (state.sleeping) {
        // 起こす：睡眠スコア計算
        const wokeHour = new Date().getHours();
        const sleepScore = calcSleepScore(wokeHour);
        state.sleeping = false;
        state.sleepWokeHour = wokeHour;
        state.health = Math.max(0, state.health + sleepScore.healthDelta);
        state.satisfy = state.satisfy + 10;
        showBubble(sleepScore.msg);
        setMsg(`起きた！${sleepScore.label}`);
        setAnim('s-happy', 1000);
        spawnFx(sleepScore.healthDelta >= 0 ? ['☀️','✨','😊'] : ['😓','💦','⏰']);
        document.getElementById('sleepBtn').innerHTML = '<span class="i">🌅</span>起こす';
      } else {
        showBubble('22時になったら自動で寝るよ！');
        setMsg('22時になったら自動就寝！');
      }
      break;
  }
  updateUI(); saveGame();
}

// ===================================================

function gameover() {
  state.alive = false;

  setMsg('ゆびっこは逝ってしまった…');

// ===================================================
// 睡眠スコア計算（起床時間ベース）
// 基準：6時起床（22時就寝→8時間睡眠）
// 前後1時間ごとに健康±
// ===================================================
function calcSleepScore(wokeHour) {
  // 基準起床時刻：6時（22時就寝+8時間）
  const BASE_WAKE = 6;
  // 時間差（循環考慮）
  let diff = wokeHour - BASE_WAKE;
  if (diff > 12)  diff -= 24;
  if (diff < -12) diff += 24;
  const absDiff = Math.abs(diff);

  let healthDelta, label, msg;
  if (absDiff === 0) {
    healthDelta = +15; label = '最高の睡眠！💯'; msg = '6時起床！完璧だ！';
  } else if (absDiff === 1) {
    healthDelta = +10; label = 'いい睡眠！'; msg = 'よく寝た！';
  } else if (absDiff === 2) {
    healthDelta = +5;  label = 'まあまあ'; msg = 'もう少し規則正しく…';
  } else if (absDiff === 3) {
    healthDelta = 0;   label = 'ギリギリ'; msg = '睡眠リズム乱れてるぞ';
  } else if (absDiff === 4) {
    healthDelta = -5;  label = '寝すぎ or 寝不足'; msg = 'リズム狂ってる…';
  } else {
    healthDelta = -10; label = '睡眠最悪😞'; msg = 'こんな時間に起きるな…';
  }
  return { healthDelta, label, msg };
}

// ===================================================
// ミニゲーム① ドラムタップ
// ===================================================
let drumTimer = null;
let drumScore = 0, drumMiss = 0, drumTotal = 0;

function startDrum() {
  drumScore = 0; drumMiss = 0; drumTotal = 0;
  const COLORS = ['#e06060','#60a0e0','#60e090','#e0c060'];
  const LANE_COUNT = 4;
  let timeLeft = 20;
  let noteInterval, countInterval;

  openMg(`
    <div class="mg-title">🥁 ドラムタップ！</div>
    <div class="mg-info" id="drumInfo">あと <span id="drumTime">20</span>秒　🎯<span id="drumScoreDisp">0</span></div>
    <div class="mg-screen" id="drumScreen" style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:2px;">
      ${[0,1,2,3].map(i=>`
        <div class="drum-lane" style="position:relative;height:100%;background:rgba(255,255,255,0.03);border-radius:6px;" id="lane${i}">
          <div class="drum-hit-zone"></div>
          <button class="drum-lane-btn" style="background:${COLORS[i]}22;border-top:none;" onclick="drumHit(${i})"></button>
        </div>`).join('')}
    </div>
    <div class="mg-btn-row">
      <button class="mg-btn close" onclick="endDrum(true)">やめる</button>
    </div>
  `);

  // ノーツを生成
  noteInterval = setInterval(() => {
    if (timeLeft <= 0) return;
    const lane = Math.floor(Math.random() * LANE_COUNT);
    const laneEl = document.getElementById('lane'+lane);
    if (!laneEl) return;
    const note = document.createElement('div');
    note.className = 'drum-note';
    note.dataset.lane = lane;
    note.dataset.hit = '0';
    const dur = 1.2 + Math.random() * 0.6;
    note.style.cssText = `background:${COLORS[lane]};animation-duration:${dur}s;top:-40px;`;
    note.style.animation = `note-fall ${dur}s linear forwards`;
    laneEl.insertBefore(note, laneEl.querySelector('.drum-hit-zone'));
    drumTotal++;
    setTimeout(() => {
      if (note.dataset.hit === '0') {
        note.remove();
        drumMiss++;
        showJudge(laneEl, 'MISS', '#ff6060');
      }
    }, dur * 1000);
  }, 600);

  // カウントダウン
  countInterval = setInterval(() => {
    timeLeft--;
    const el = document.getElementById('drumTime');
    if (el) el.textContent = timeLeft;
    if (timeLeft <= 0) { clearInterval(noteInterval); clearInterval(countInterval); setTimeout(() => endDrum(false), 800); }
  }, 1000);

  drumTimer = { noteInterval, countInterval };
}

window.drumHit = function(lane) {
  const laneEl = document.getElementById('lane'+lane);
  if (!laneEl) return;
  // ヒットゾーン付近のノーツを探す
  const notes = laneEl.querySelectorAll('.drum-note');
  let hit = false;
  notes.forEach(note => {
    if (note.dataset.hit === '1') return;
    const rect = note.getBoundingClientRect();
    const zoneRect = laneEl.querySelector('.drum-hit-zone').getBoundingClientRect();
    const overlap = rect.bottom > zoneRect.top && rect.top < zoneRect.bottom + 30;
    if (overlap && !hit) {
      hit = true;
      note.dataset.hit = '1';
      note.style.opacity = '0';
      setTimeout(() => note.remove(), 100);
      // 判定
      const center = (rect.top + rect.bottom) / 2;
      const zoneMid = (zoneRect.top + zoneRect.bottom) / 2;
      const diff = Math.abs(center - zoneMid);
      if (diff < 20) {
        drumScore += 2; showJudge(laneEl, 'PERFECT', '#f0d060');
      } else {
        drumScore += 1; showJudge(laneEl, 'GOOD', '#60e090');
      }
      const sd = document.getElementById('drumScoreDisp');
      if (sd) sd.textContent = drumScore;
    }
  });
};

function showJudge(laneEl, text, color) {
  const el = document.createElement('div');
  el.className = 'drum-judge';
  el.textContent = text;
  el.style.cssText = `color:${color};left:50%;transform:translateX(-50%);bottom:60px;font-size:11px;`;
  laneEl.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function endDrum(quit) {
  if (drumTimer) { clearInterval(drumTimer.noteInterval); clearInterval(drumTimer.countInterval); }
  if (quit) { closeMg(); return; }
  const rate = drumTotal > 0 ? drumScore / (drumTotal * 2) : 0;
  let rank, weightDelta, healthDelta, comment;
  if      (rate >= 0.8) { rank='S'; weightDelta=-12; healthDelta=12; comment='完璧だ！！！'; }
  else if (rate >= 0.6) { rank='A'; weightDelta=-8;  healthDelta=8;  comment='なかなかやるな！'; }
  else if (rate >= 0.4) { rank='B'; weightDelta=-5;  healthDelta=5;  comment='まあまあだな'; }
  else                  { rank='C'; weightDelta=-2;  healthDelta=2;  comment='もっと練習だ…'; }

  openMg(`
    <div class="mg-title">🥁 結果発表！</div>
    <div style="font-size:48px;text-align:center;">${rank === 'S' ? '🌟' : rank === 'A' ? '⭐' : rank === 'B' ? '👍' : '💦'}</div>
    <div class="mg-result">
      ランク <b style="font-size:22px;color:#f0d060;">${rank}</b><br>
      スコア ${drumScore}点　MISS ${drumMiss}回<br>
      <span style="font-size:10px;color:#c8e888;">${comment}</span>
    </div>
    <div style="font-size:9px;color:#8a8ab8;">体重${weightDelta}　健康+${healthDelta}</div>
    <div class="mg-btn-row">
      <button class="mg-btn primary" onclick="closeMg(); mgReward()">とじる</button>
    </div>
  `);
}

// ===================================================
// ミニゲーム② 息切れチャレンジ
// ===================================================
let breathCount = 0, breathTimer = null, breathActive = false;

function startBreath() {
  breathCount = 0; breathActive = true;
  const TOTAL = 10;
  let timeLeft = TOTAL;

  openMg(`
    <div class="mg-title">💨 息切れチャレンジ！</div>
    <div class="mg-info">10秒間ひたすら連打！</div>
    <div class="mg-screen" id="breathScreen" style="display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;">
      <div id="breathCircle" style="width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,#4040c0,#202080);border:3px solid #6060e0;display:flex;align-items:center;justify-content:center;flex-direction:column;box-shadow:0 0 30px rgba(80,80,220,0.4);transition:transform 0.05s;">
        <span id="breathCountDisp" style="font-size:40px;color:#f5e6c8;line-height:1;">0</span>
        <span style="font-size:9px;color:#9090d0;">たたけ！</span>
      </div>
      <div id="breathBar" style="position:absolute;bottom:0;left:0;height:4px;width:100%;background:linear-gradient(90deg,#6060e0,#c060e0);border-radius:0 0 8px 8px;transition:width 0.1s linear;"></div>
    </div>
    <div class="mg-info" id="breathMsg">ひたすら押せ！</div>
    <div class="mg-btn-row">
      <button class="mg-btn close" onclick="endBreath(true)">やめる</button>
    </div>
  `);

  // mg-screenにタップ・クリック・タッチ全部登録
  setTimeout(() => {
    const screen = document.getElementById('breathScreen');
    if (!screen) return;
    const handler = (e) => { e.preventDefault(); breathTap(); };
    screen.addEventListener('click', handler);
    screen.addEventListener('touchstart', handler, { passive: false });
  }, 100);

  breathTimer = setInterval(() => {
    timeLeft -= 0.1;
    const bar = document.getElementById('breathBar');
    if (bar) bar.style.width = Math.max(0, (timeLeft / TOTAL * 100)) + '%';
    // リアクション
    const msg = document.getElementById('breathMsg');
    if (msg) {
      if      (breathCount > 60) msg.textContent = '化け物か！！！';
      else if (breathCount > 40) msg.textContent = 'すごい！やばい！';
      else if (breathCount > 20) msg.textContent = 'いいぞ！続けろ！';
      else                       msg.textContent = 'ひたすら押せ！';
    }
    if (timeLeft <= 0) { clearInterval(breathTimer); breathActive = false; setTimeout(() => endBreath(false), 300); }
  }, 100);
}

window.breathTap = function() {
  if (!breathActive) return;
  breathCount++;
  const d = document.getElementById('breathCountDisp');
  if (d) d.textContent = breathCount;
  const c = document.getElementById('breathCircle');
  if (c) { c.classList.add('pressed'); setTimeout(() => c.classList.remove('pressed'), 80); }
};

function endBreath(quit) {
  clearInterval(breathTimer);
  breathActive = false;
  if (quit) { closeMg(); return; }
  let rank, weightDelta, healthDelta, comment;
  if      (breathCount >= 70) { rank='S'; weightDelta=-15; healthDelta=15; comment='ゆびっこ限界突破！！'; }
  else if (breathCount >= 50) { rank='A'; weightDelta=-10; healthDelta=10; comment='すごい運動量だ！'; }
  else if (breathCount >= 30) { rank='B'; weightDelta=-6;  healthDelta=6;  comment='いい汗かいた！'; }
  else if (breathCount >= 15) { rank='C'; weightDelta=-3;  healthDelta=3;  comment='まあ、運動はしたな'; }
  else                        { rank='D'; weightDelta=-1;  healthDelta=1;  comment='それだけか…'; }

  const emoji = rank==='S'?'🔥':rank==='A'?'💪':rank==='B'?'😅':rank==='C'?'😤':'😑';
  openMg(`
    <div class="mg-title">💨 結果！</div>
    <div style="font-size:48px;text-align:center;">${emoji}</div>
    <div class="mg-result">
      ${breathCount}回連打！<br>
      ランク <b style="font-size:22px;color:#f0d060;">${rank}</b><br>
      <span style="font-size:10px;color:#c8e888;">${comment}</span>
    </div>
    <div style="font-size:9px;color:#8a8ab8;">体重${weightDelta}　健康+${healthDelta}</div>
    <div class="mg-btn-row">
      <button class="mg-btn primary" onclick="closeMg(); mgReward()">とじる</button>
    </div>
  `);
}

const AUDIO = {
  title:    new Audio('bgm-title.mp3'),
  main:     new Audio('bgm-main.mp3'),
  minigame: new Audio('bgm-minigame.mp3'),
  levelup:  new Audio('se-levelup.mp3'),
  gameover: new Audio('se-gameover.mp3'),
  poop:     new Audio('se-poop.mp3'),
};
AUDIO.title.loop = true; AUDIO.main.loop = true; AUDIO.minigame.loop = true;
AUDIO.title.volume = 0.6; AUDIO.main.volume = 0.5; AUDIO.minigame.volume = 0.5;
AUDIO.levelup.volume = 0.8; AUDIO.gameover.volume = 0.7; AUDIO.poop.volume = 0.9;

let currentBGM = null;

function playBGM(name) {
  if (currentBGM === name) return;
  ['title','main','minigame'].forEach(k => { AUDIO[k].pause(); AUDIO[k].currentTime = 0; });
  currentBGM = name;
  if (name && AUDIO[name]) AUDIO[name].play().catch(()=>{});
}
function stopBGM() {
  ['title','main','minigame'].forEach(k => { AUDIO[k].pause(); AUDIO[k].currentTime = 0; });
  currentBGM = null;
}
function playSE(name) {
  if (!AUDIO[name]) return;
  AUDIO[name].currentTime = 0;
  AUDIO[name].play().catch(()=>{});
}
