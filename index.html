<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2d1b69">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ゆびっこ">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>ゆびっこ育成ゲーム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  background:#1a1a2e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'DotGothic16',monospace;
  background-image:radial-gradient(circle at 20% 50%,#2a1a3e 0%,transparent 50%),
                   radial-gradient(circle at 80% 20%,#001a2a 0%,transparent 50%);
  gap:8px;
}
.game-title{color:#f5e6c8;font-size:12px;letter-spacing:4px;text-shadow:0 0 12px rgba(245,230,200,0.5);}

/* ===== デバイス ===== */
.device{
  width:min(300px,92vw);
  background:linear-gradient(160deg,#f5e6c8 0%,#e8d5a3 40%,#d4b87a 100%);
  border-radius:40px 40px 60px 60px;
  padding:16px 16px 24px;
  box-shadow:0 0 0 4px #b8954a,0 0 0 7px #8a6c2a,0 20px 60px rgba(0,0,0,0.8),
    inset 0 2px 6px rgba(255,255,255,0.5),inset 0 -4px 8px rgba(0,0,0,0.15);
}

/* ===== スクリーン ===== */
.screen-bezel{background:#3a2a10;border-radius:14px;padding:8px;box-shadow:inset 0 4px 12px rgba(0,0,0,0.7);margin-bottom:14px;}
.screen{background:linear-gradient(180deg,#b8d878,#c8e888);border-radius:8px;width:100%;height:200px;position:relative;overflow:hidden;}
.screen::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 3px);pointer-events:none;z-index:20;border-radius:8px;}

/* ===== ステータスバー ===== */
.status-area{position:absolute;top:6px;left:7px;right:7px;z-index:5;display:flex;flex-direction:column;gap:2px;}
.stat-row{display:flex;align-items:center;gap:3px;font-size:7px;color:#2a4a08;}
.stat-label{width:36px;font-size:6px;}
.stat-bar-bg{flex:1;height:5px;background:#90b850;border-radius:2px;overflow:hidden;}
.stat-bar-fill{height:100%;background:#2a4a08;border-radius:2px;transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1);}
.stat-bar-fill.health-high{background:#2a6a08;}
.stat-bar-fill.health-mid {background:#8a6a00;}
.stat-bar-fill.health-low {background:#aa3300;}
.stat-bar-fill.health-crit{background:#cc0000;}
.stat-num{font-size:6px;width:18px;text-align:right;color:#2a4a08;}

/* ===== バッジ類 ===== */
.badges{position:absolute;top:6px;right:7px;z-index:5;text-align:right;font-size:7px;color:#2a4a08;line-height:1.7;}

/* ===== キャラエリア ===== */
.pet-area{position:absolute;bottom:26px;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;height:125px;}
.pet-img{
  height:120px;
  width:auto;
  object-fit:contain;
  transform-origin:bottom center;
  filter:drop-shadow(0 6px 8px rgba(0,0,0,0.4));
  transition:opacity 0.35s ease, transform 0.8s cubic-bezier(0.34,1.56,0.64,1);
}
/* 体型スケール（横幅だけ変える） */
.pet-img.body-thin   {transform:scaleX(0.78);}
.pet-img.body-normal {transform:scaleX(1.0);}
.pet-img.body-chubby {transform:scaleX(1.18);}
.pet-img.body-fat    {transform:scaleX(1.38);}

/* アニメーション */
@keyframes idle-bounce {0%,100%{translate:0 0;rotate:0deg;}50%{translate:0 -8px;rotate:-2deg;}}
@keyframes happy-jump  {0%,100%{translate:0 0;rotate:-4deg;}25%{translate:0 -14px;rotate:4deg;}75%{translate:0 -8px;rotate:-2deg;}}
@keyframes sad-droop   {0%,100%{translate:0 0;rotate:-2deg;}50%{translate:0 3px;rotate:2deg;}}
@keyframes angry-shake {0%,100%{translate:0 0;}20%{translate:-6px 0;rotate:-4deg;}40%{translate:6px 0;rotate:4deg;}60%{translate:-4px 0;}80%{translate:4px 0;}}
@keyframes sleep-sway  {0%,100%{rotate:-5deg;}50%{rotate:5deg;translate:0 2px;}}
@keyframes eating      {0%,100%{translate:0 0;scale:1;}30%{translate:0 -5px;scale:1.08;}60%{translate:0 2px;scale:0.96;}}
@keyframes sick-wobble {0%,100%{rotate:0deg;}25%{rotate:-8deg;translate:0 2px;}75%{rotate:8deg;translate:0 2px;}}
@keyframes death-fall  {0%{rotate:0deg;translate:0 0;opacity:1;}60%{rotate:90deg;translate:0 10px;opacity:0.5;}100%{rotate:90deg;translate:0 30px;opacity:0;}}
@keyframes bald-panic  {0%,100%{translate:0 0;scale:1;}20%{translate:0 -10px;scale:1.1;rotate:-5deg;}40%{translate:0 -5px;scale:0.95;rotate:5deg;}}

.pet-img.s-idle   {animation:idle-bounce 2s    ease-in-out infinite;}
.pet-img.s-happy  {animation:happy-jump  0.5s  ease-in-out infinite;}
.pet-img.s-sad    {animation:sad-droop   2.5s  ease-in-out infinite;}
.pet-img.s-angry  {animation:angry-shake 0.4s  ease-in-out infinite;}
.pet-img.s-sleepy {animation:sleep-sway  3s    ease-in-out infinite;}
.pet-img.s-eating {animation:eating      0.35s ease-in-out infinite;}
.pet-img.s-sick   {animation:sick-wobble 1s    ease-in-out infinite;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3)) hue-rotate(60deg) saturate(0.7);}
.pet-img.s-dead   {animation:death-fall  1.5s  ease-in     forwards;}
.pet-img.s-bald   {animation:bald-panic  0.4s  ease-in-out infinite;}

/* スクリーンフラッシュ */
@keyframes flash-warn {0%,100%{background:linear-gradient(180deg,#b8d878,#c8e888);}50%{background:linear-gradient(180deg,#e8c878,#f0d888);}}
.screen.flashing {animation:flash-warn 0.5s ease-in-out 3;}

/* 吹き出し */
.bubble{position:absolute;top:36px;right:7px;background:white;border:2px solid #2a4a08;border-radius:10px;padding:3px 8px;font-size:10px;z-index:15;opacity:0;transform:scale(0);transition:opacity 0.2s,transform 0.2s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;color:#2a4a08;pointer-events:none;max-width:150px;white-space:normal;text-align:center;}
.bubble.show{opacity:1;transform:scale(1);}
.bubble::after{content:'';position:absolute;bottom:-8px;left:12px;border:4px solid transparent;border-top:4px solid #2a4a08;}

/* エフェクト */
.fx{position:absolute;inset:0;pointer-events:none;z-index:10;overflow:hidden;}
.fxp{position:absolute;font-size:15px;animation:pfx 1s ease-out forwards;}
@keyframes pfx{0%{translate:0 0;scale:0.5;opacity:1;}100%{translate:0 -60px;scale:1.2;opacity:0;}}

/* 地面・影 */
.ground{position:absolute;bottom:0;left:0;right:0;height:26px;background:repeating-linear-gradient(90deg,#90b840 0,#90b840 12px,#80a830 12px,#80a830 24px);border-radius:0 0 8px 8px;}
.shadow{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);width:60px;height:8px;background:radial-gradient(ellipse,rgba(0,0,0,0.3) 0%,transparent 70%);border-radius:50%;}

/* メッセージバー */
.msg-bar{background:#3a2a10;border-radius:0 0 8px 8px;margin:-8px -8px 10px;padding:4px 10px;font-size:9px;color:#c8e888;text-align:center;min-height:20px;}

/* ===== ボタン ===== */
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{height:44px;border-radius:22px;border:none;cursor:pointer;font-family:'DotGothic16',monospace;font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px;transition:transform 0.1s,box-shadow 0.1s;user-select:none;}
.btn:active{transform:scale(0.93) translateY(2px);}
.btn .i{font-size:17px;}
.bf{background:linear-gradient(145deg,#ff9b4e,#e07a2a);color:#fff;box-shadow:0 4px 0 #9e4e10,0 5px 12px rgba(0,0,0,0.3);}
.bp{background:linear-gradient(145deg,#6ee86e,#3db83d);color:#fff;box-shadow:0 4px 0 #1f7a1f,0 5px 12px rgba(0,0,0,0.3);}
.bc{background:linear-gradient(145deg,#5ec8f0,#2a9fd4);color:#fff;box-shadow:0 4px 0 #1a6a96,0 5px 12px rgba(0,0,0,0.3);}
.bs{background:linear-gradient(145deg,#b09eff,#7c5ce0);color:#fff;box-shadow:0 4px 0 #4a2a9e,0 5px 12px rgba(0,0,0,0.3);}
.bf:active{box-shadow:0 1px 0 #9e4e10,0 2px 6px rgba(0,0,0,0.3);}
.bp:active{box-shadow:0 1px 0 #1f7a1f,0 2px 6px rgba(0,0,0,0.3);}
.bc:active{box-shadow:0 1px 0 #1a6a96,0 2px 6px rgba(0,0,0,0.3);}
.bs:active{box-shadow:0 1px 0 #4a2a9e,0 2px 6px rgba(0,0,0,0.3);}

/* ===== ミニゲームオーバーレイ ===== */
.minigame-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  z-index:100;opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.minigame-overlay.show{opacity:1;pointer-events:all;}
.minigame-box{
  width:min(290px,90vw);background:#1a3a00;border-radius:20px;padding:16px;
  border:3px solid #4a8a10;box-shadow:0 0 30px rgba(74,138,16,0.4);
}
.mg-title{color:#c8e888;font-size:14px;text-align:center;margin-bottom:12px;}
.mg-screen{background:#0a2000;border-radius:10px;height:180px;position:relative;overflow:hidden;margin-bottom:12px;cursor:pointer;}
.mg-score{color:#c8e888;font-size:10px;text-align:center;margin-bottom:8px;}
.mg-close{background:#c8e888;color:#1a3a00;border:none;padding:8px 24px;border-radius:16px;font-family:'DotGothic16',monospace;font-size:11px;cursor:pointer;display:block;margin:0 auto;}

/* 食べ物タップゲーム */
.food-item{position:absolute;font-size:24px;cursor:pointer;user-select:none;transition:transform 0.1s;animation:fall linear forwards;}
@keyframes fall{from{top:-40px;}to{top:200px;}}
.food-item:active{transform:scale(0.7);}

/* ゲームオーバー */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;z-index:30;border-radius:8px;opacity:0;pointer-events:none;transition:opacity 0.6s;}
.overlay.show{opacity:1;pointer-events:all;}
.ov-emoji{font-size:36px;}
.ov-text{color:#c8e888;font-size:14px;text-align:center;line-height:1.8;}
.ov-sub{color:#90b060;font-size:8px;}
.restart-btn{background:#c8e888;color:#1a3a00;border:none;padding:8px 20px;border-radius:16px;font-family:'DotGothic16',monospace;font-size:10px;cursor:pointer;margin-top:4px;}
</style>
</head>
<body>
<div class="game-title">🫵 ゆびっこ 🫵</div>

<div class="device">
  <div class="screen-bezel">
    <div class="msg-bar" id="msgBar">やあ！おれはゆびっこだ！よろしくな！</div>
    <div class="screen" id="mainScreen">

      <div class="status-area">
        <div class="stat-row"><span class="stat-label">🍖おなか</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="bH" style="width:80%"></div></div><span class="stat-num" id="nH">80</span></div>
        <div class="stat-row"><span class="stat-label">😊きもち</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="bM" style="width:70%"></div></div><span class="stat-num" id="nM">70</span></div>
        <div class="stat-row"><span class="stat-label">💪けんこう</span><div class="stat-bar-bg"><div class="stat-bar-fill health-high" id="bK" style="width:100%"></div></div><span class="stat-num" id="nK">100</span></div>
        <div class="stat-row"><span class="stat-label">😴ねむい</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="bS" style="width:20%"></div></div><span class="stat-num" id="nS">20</span></div>
        <div class="stat-row"><span class="stat-label">⚖️たいじゅう</span><div class="stat-bar-bg"><div class="stat-bar-fill" id="bW" style="width:50%"></div></div><span class="stat-num" id="nW">50</span></div>
      </div>

      <div class="badges" id="badges">💇フサフサ<br>⚖️ふつう</div>

      <div class="pet-area">
        <div class="shadow"></div>
        <img class="pet-img s-idle body-normal" id="petImg" src="assets/hair0.png" alt="ゆびっこ">
      </div>

      <div class="bubble" id="bubble">よろしくな！</div>
      <div class="fx" id="fx"></div>
      <div class="ground"></div>

      <div class="overlay" id="overlay">
        <div class="ov-emoji">🫵💀</div>
        <div class="ov-text" id="ovText">ゆびっこは<br>逝ってしまった…</div>
        <div class="ov-sub" id="ovSub"></div>
        <button class="restart-btn" onclick="restart()">もう一度育てる</button>
      </div>
    </div>
  </div>

  <div class="btn-grid">
    <button class="btn bf" onclick="action('feed')"><span class="i">🍖</span>ごはん</button>
    <button class="btn bp" onclick="openMinigame('run')"><span class="i">🏃</span>うんどう</button>
    <button class="btn bc" onclick="action('clean')"><span class="i">🛁</span>おふろ</button>
    <button class="btn bs" onclick="action('sleep')"><span class="i">💤</span>ねかす</button>
  </div>
</div>

<!-- ミニゲーム：食べ物キャッチ（うんどう） -->
<div class="minigame-overlay" id="mgOverlay">
  <div class="minigame-box">
    <div class="mg-title" id="mgTitle">🏃 はしれ！ゆびっこ！</div>
    <div class="mg-score" id="mgScore">タップして食べ物をよけろ！あと <span id="mgTimer">10</span>秒</div>
    <div class="mg-screen" id="mgScreen"></div>
    <button class="mg-close" onclick="closeMinigame()">やめる</button>
  </div>
</div>

<script>
// ===================================================
// セーブ/ロード
// ===================================================
const SAVE_KEY = 'yubicci_save';
function saveGame() {
  localStorage.setItem(SAVE_KEY, JSON.stringify({
    ...state,
    savedAt: Date.now()
  }));
}
function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const saved = JSON.parse(raw);
    // 離れてた時間分ステータスを自動減少
    const offlineSec = Math.min((Date.now() - saved.savedAt) / 1000, 3600);
    const ticks = Math.floor(offlineSec / 5);
    if (ticks > 0 && saved.alive) {
      saved.hunger  = Math.max(0, saved.hunger  - ticks * 4);
      saved.happy   = Math.max(0, saved.happy   - ticks * 3);
      saved.sleep   = Math.min(100, saved.sleep + ticks * 4);
      saved.health  = Math.max(0, saved.health  - (saved.hunger < 20 ? ticks * 3 : 0));
      saved.age     += Math.floor(ticks / 12);
    }
    return saved;
  } catch(e) { return null; }
}

// ===================================================
// ゲーム状態
// ===================================================
const DEFAULT_STATE = {
  hunger:80, happy:70, health:100, sleep:20, weight:50,
  age:0, alive:true, sleeping:false, actionLock:false,
  hairStage:0, bodyStage:1  // 0=痩せ 1=ふつう 2=ぽっちゃり 3=デブ
};

const saved = loadGame();
let state = saved && saved.alive ? {...DEFAULT_STATE, ...saved, actionLock:false} : {...DEFAULT_STATE};
const startTick = Math.floor(Date.now()/5000) - (state.age * 12);

// 禿げ段階
const HAIR = [
  {th:80, file:'assets/hair0.png', label:'💇フサフサ', alert:null},
  {th:60, file:'assets/hair1.png', label:'😰薄毛気味', alert:'…頭、涼しくない？'},
  {th:40, file:'assets/hair2.png', label:'😱だいぶやばい', alert:'ちょ！頭！'},
  {th:20, file:'assets/hair3.png', label:'🆘ほぼ禿げ', alert:'1本しかない！'},
  {th:0,  file:'assets/hair4.png', label:'👴つるつる',  alert:'ついに…逝ったか…'},
];
// 体型段階
const BODY = [
  {label:'🦴ガリガリ', cls:'body-thin'},
  {label:'⚖️ふつう',   cls:'body-normal'},
  {label:'🍩ぽっちゃり',cls:'body-chubby'},
  {label:'🐷デブ',     cls:'body-fat'},
];

// ===================================================
// メッセージ
// ===================================================
const MSG = {
  idle:   ['よう！元気か？','ゆびっこだぞ！','なんか用か？','指ってすごくない？','サムズアップ得意！'],
  hungry: ['腹減った…','めしくれ頼む','うぐぐ…'],
  unhappy:['つまんね','遊んでくれよ','ひまだ〜'],
  sick:   ['ぐえっ…','気分悪い…','うわぁ…'],
  sleepy: ['ねむ…','Zz…','限界…'],
  fat:    ['…重い','動きたくない…','ぽよぽよ'],
  thin:   ['腹減りすぎ…','ガリガリだ…','肋骨見えそう'],
  feed:   ['うんまい！！！','ありがとよ！','至福！','うっめ〜！'],
  play:   ['いえええええ！','楽しいな〜！','最高！'],
  clean:  ['さっぱり！','ピカピカ！','いい香り〜'],
  sleep:  ['おやすみ…','Zz…','夢の中へ…'],
  wake:   ['おはよ！','よく寝た！','充電完了！'],
  full:   ['もう食えない！','満腹…'],
};
const rnd = a => a[Math.floor(Math.random()*a.length)];

// ===================================================
// UI更新
// ===================================================
const petImg = document.getElementById('petImg');

function updateUI() {
  const s = state;
  const pairs = [['bH','nH',s.hunger],['bM','nM',s.happy],['bK','nK',s.health],['bS','nS',s.sleep],['bW','nW',s.weight]];
  pairs.forEach(([bid,nid,val]) => {
    document.getElementById(bid).style.width = val + '%';
    document.getElementById(nid).textContent = Math.round(val);
  });
  const hb = document.getElementById('bK');
  hb.className = 'stat-bar-fill ' + (s.health>75?'health-high':s.health>50?'health-mid':s.health>25?'health-low':'health-crit');
  updateHair();
  updateBody();
}

function updateHair() {
  const s = state;
  let ns = 0;
  if      (s.health < 20) ns = 4;
  else if (s.health < 40) ns = 3;
  else if (s.health < 60) ns = 2;
  else if (s.health < 80) ns = 1;
  const changed = ns !== s.hairStage;
  s.hairStage = ns;
  const stage = HAIR[ns];
  if (changed) {
    petImg.style.opacity = '0';
    setTimeout(() => { petImg.src = stage.file; petImg.style.opacity = '1'; }, 320);
    if (stage.alert) {
      showBubble(stage.alert); setMsg(stage.alert);
      spawnFx(['😱','💨','🪮']);
      const sc = document.getElementById('mainScreen');
      sc.classList.add('flashing');
      setTimeout(() => sc.classList.remove('flashing'), 1600);
    }
  } else {
    petImg.src = stage.file;
  }
  updateBadges();
}

function updateBody() {
  const s = state;
  let nb = 1;
  if      (s.weight >= 80) nb = 3;
  else if (s.weight >= 65) nb = 2;
  else if (s.weight <= 25) nb = 0;
  const changed = nb !== s.bodyStage;
  s.bodyStage = nb;
  ['body-thin','body-normal','body-chubby','body-fat'].forEach(c => petImg.classList.remove(c));
  petImg.classList.add(BODY[nb].cls);
  if (changed) spawnFx(nb > 1 ? ['⬆️','🍖','😅'] : ['⬇️','💨','😤']);
  updateBadges();
}

function updateBadges() {
  document.getElementById('badges').innerHTML =
    HAIR[state.hairStage].label + '<br>' + BODY[state.bodyStage].label;
}

// ===================================================
// アニメーション
// ===================================================
const ANIMS = ['s-idle','s-happy','s-sad','s-angry','s-sleepy','s-eating','s-sick','s-dead','s-bald'];
function setAnim(a, dur=0) {
  ANIMS.forEach(s => petImg.classList.remove(s));
  petImg.classList.add(a);
  if (dur > 0) setTimeout(() => setAnim(autoAnim()), dur);
}
function autoAnim() {
  const s = state;
  if (!s.alive)    return 's-dead';
  if (s.sleeping)  return 's-sleepy';
  if (s.health<20) return 's-bald';
  if (s.health<35) return 's-sick';
  if (s.sleep>75)  return 's-sleepy';
  if (s.hunger<25||s.happy<25) return 's-sad';
  if (s.weight>80) return 's-sad';
  if (s.hunger>70&&s.happy>70&&s.health>70) return 's-happy';
  return 's-idle';
}

// ===================================================
// エフェクト・吹き出し・メッセージ
// ===================================================
function spawnFx(emojis) {
  const c = document.getElementById('fx');
  for (let i=0;i<5;i++) setTimeout(()=>{
    const el = document.createElement('div'); el.className='fxp';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left   = (20+Math.random()*200)+'px';
    el.style.bottom = (50+Math.random()*40)+'px';
    c.appendChild(el); setTimeout(()=>el.remove(),1100);
  }, i*80);
}
function showBubble(t) {
  const b=document.getElementById('bubble');
  b.textContent=t; b.classList.add('show');
  clearTimeout(b._t); b._t=setTimeout(()=>b.classList.remove('show'),2400);
}
function setMsg(t) { document.getElementById('msgBar').textContent=t; }

// ===================================================
// アクション
// ===================================================
function action(type) {
  if (!state.alive || state.actionLock) return;
  if (state.sleeping && type!=='sleep') { showBubble('Zz…(寝てるよ)'); return; }
  state.actionLock = true;
  setTimeout(()=>state.actionLock=false, 800);

  switch(type) {
    case 'feed':
      if (state.hunger>=95) { showBubble(rnd(MSG.full)); setMsg('おなかいっぱいだ…'); setAnim('s-sad',1000); }
      else {
        state.hunger = Math.min(100,state.hunger+22);
        state.weight = Math.min(100,state.weight+4);
        state.happy  = Math.min(100,state.happy+5);
        state.health = Math.min(100,state.health+2);
        showBubble(rnd(MSG.feed)); setMsg('ごはんをあげた！');
        setAnim('s-eating',1200); spawnFx(['🍖','✨','😋']);
      }
      break;
    case 'clean':
      state.health = Math.min(100,state.health+22);
      state.happy  = Math.min(100,state.happy+8);
      showBubble(rnd(MSG.clean)); setMsg('お風呂に入れた！');
      setAnim('s-happy',1200); spawnFx(['💧','✨','🫧']);
      break;
    case 'sleep':
      if (state.sleeping) {
        state.sleeping=false; state.sleep=Math.max(0,state.sleep-60);
        showBubble(rnd(MSG.wake)); setMsg('ゆびっこが起きた！');
        setAnim('s-happy',1000); spawnFx(['☀️','✨']);
      } else {
        state.sleeping=true;
        showBubble(rnd(MSG.sleep)); setMsg('寝た… (もう一度で起こす)');
        setAnim('s-sleepy'); spawnFx(['💤','🌙']);
      }
      break;
    case 'run_reward':
      // ミニゲーム（運動）報酬
      state.weight = Math.max(0, state.weight-12);
      state.happy  = Math.min(100,state.happy+18);
      state.hunger = Math.max(0, state.hunger-10);
      state.health = Math.min(100,state.health+8);
      showBubble('いい運動だった！'); setMsg('運動した！体重が減った！');
      setAnim('s-happy',1500); spawnFx(['🏃','💨','⭐']);
      break;
  }
  updateUI();
  saveGame();
}

// ===================================================
// 自動ステータス減少（5秒ごと）
// ===================================================
setInterval(() => {
  if (!state.alive) return;
  if (state.sleeping) {
    state.sleep  = Math.max(0,   state.sleep  - 14);
    state.hunger = Math.max(0,   state.hunger - 1);
    state.health = Math.min(100, state.health + 3);
    state.weight = Math.max(0,   state.weight - 0.5);
  } else {
    state.hunger = Math.max(0,   state.hunger - 4);
    state.happy  = Math.max(0,   state.happy  - 3);
    state.sleep  = Math.min(100, state.sleep  + 4);
    state.weight = Math.min(100, state.weight + 0.5); // じわじわ太る
    if (state.hunger < 20) state.health = Math.max(0, state.health - 6);
    if (state.sleep  > 85) state.health = Math.max(0, state.health - 4);
    if (state.happy  < 20) state.health = Math.max(0, state.health - 3);
    if (state.weight > 85) state.health = Math.max(0, state.health - 2);
  }
  state.age = Math.floor(Date.now()/5000) - startTick;

  if (!state.sleeping) {
    if      (state.health < 20) setMsg(rnd(MSG.sick)+'（頭も…）');
    else if (state.weight > 80) setMsg(rnd(MSG.fat));
    else if (state.weight < 25) setMsg(rnd(MSG.thin));
    else if (state.hunger < 20) setMsg(rnd(MSG.hungry));
    else if (state.sleep  > 75) setMsg(rnd(MSG.sleepy));
    else if (state.happy  < 20) setMsg(rnd(MSG.unhappy));
    else if (Math.random()<0.3)  setMsg(rnd(MSG.idle));
  }

  if (state.health <= 0) { gameover(); return; }

  setAnim(autoAnim());
  updateUI();
  saveGame();
}, 5000);

function gameover() {
  state.alive = false;
  setAnim('s-dead');
  setMsg('ゆびっこは逝ってしまった…');
  const hairMsg = state.hairStage >= 4 ? 'つるつるのまま逝った' : '';
  const fatMsg  = state.bodyStage >= 3 ? 'デブのまま逝った' : state.bodyStage === 0 ? 'ガリガリのまま逝った' : '';
  document.getElementById('ovSub').textContent = [hairMsg,fatMsg].filter(Boolean).join('・');
  setTimeout(()=>document.getElementById('overlay').classList.add('show'), 1800);
}

function restart() {
  state = {...DEFAULT_STATE};
  ANIMS.forEach(s=>petImg.classList.remove(s)); petImg.classList.add('s-idle');
  ['body-thin','body-normal','body-chubby','body-fat'].forEach(c=>petImg.classList.remove(c));
  petImg.classList.add('body-normal');
  document.getElementById('overlay').classList.remove('show');
  setMsg('また育ててくれるのか！ありがとよ！');
  showBubble('今度は禿げないぞ！');
  spawnFx(['🎉','⭐','💇']);
  localStorage.removeItem(SAVE_KEY);
  updateUI();
}

// ===================================================
// ミニゲーム（うんどう）
// ===================================================
let mgInterval = null;
let mgTimer = 10;
let mgScore = 0;
const FOODS = ['🍖','🍔','🍟','🍩','🍕','🌮','🍣','🍜'];

function openMinigame(type) {
  if (!state.alive) return;
  if (state.sleeping) { showBubble('Zz…起こして！'); return; }
  if (state.sleep > 80) { showBubble('ねむい…運動むり'); return; }
  mgScore = 0; mgTimer = 10;
  document.getElementById('mgScore').innerHTML = `食べ物をタップしてゆびっこに食べさせるな！あと <span id="mgTimer">10</span>秒`;
  document.getElementById('mgTitle').textContent = '🏃 はしれ！ゆびっこ！';
  document.getElementById('mgScreen').innerHTML = '';
  document.getElementById('mgOverlay').classList.add('show');
  startFoodGame();
}

function startFoodGame() {
  const screen = document.getElementById('mgScreen');
  // 食べ物を定期的に落とす
  mgInterval = setInterval(() => {
    if (mgTimer <= 0) { endMinigame(); return; }
    const el = document.createElement('div');
    el.className = 'food-item';
    el.textContent = FOODS[Math.floor(Math.random()*FOODS.length)];
    el.style.left = (5+Math.random()*80)+'%';
    const dur = 1.5 + Math.random()*1.5;
    el.style.animation = `fall ${dur}s linear forwards`;
    el.addEventListener('click', () => {
      el.remove(); mgScore++;
      document.getElementById('mgTimer').textContent = mgTimer;
    });
    screen.appendChild(el);
    setTimeout(()=>{ if(el.parentNode) el.remove(); }, dur*1000);
    mgTimer -= 1;
    const timerEl = document.getElementById('mgTimer');
    if (timerEl) timerEl.textContent = mgTimer;
  }, 1000);
}

function endMinigame() {
  clearInterval(mgInterval);
  document.getElementById('mgTitle').textContent = `結果：${mgScore}個避けた！`;
  document.getElementById('mgScreen').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#c8e888;font-size:28px;">🏃✨</div>`;
  setTimeout(() => {
    closeMinigame();
    action('run_reward');
  }, 1500);
}

function closeMinigame() {
  clearInterval(mgInterval);
  document.getElementById('mgOverlay').classList.remove('show');
}

// Service Worker 登録
// ===================================================
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js').then(() => {
    console.log('SW registered');
  });
}

// ===================================================
// 初期化
// ===================================================
updateUI();
setAnim(autoAnim());
setTimeout(() => showBubble(saved ? 'おかえり！' : 'よろしくな！'), 600);
</script>
